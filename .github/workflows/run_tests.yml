name: Build

on:
    push:
        branches:
            - ci_test
            - testing
            - main
        tags:
            - 'v*'

env:
  # Never read or write pip's HTTP/wheel cache: on the self-hosted runners
  # $HOME is a persistent bind mount, so caching leaks state across jobs/repos.
  PIP_NO_CACHE_DIR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  run_pytest:
    name: ${{ matrix.compiler == 'clang' && format('[clang] {0} / py{1}', matrix.os, matrix.python-version) || format('{0} / py{1}', matrix.os, matrix.python-version) }}
    if: github.repository_owner == 'michalsta' && github.ref != 'refs/heads/main'
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        os: [linux-amd64, linux-arm64, windows-latest, macos-15-intel, macos-latest, windows-11-arm]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        compiler: [default, clang]
        include:
        - os: linux-amd64
          runner: [self-hosted, wloczykij-amd64]
          container: localhost:5000/ubuntu-ci:24.04
        - os: linux-arm64
          runner: [self-hosted, wloczykij-arm64]
          container: localhost:5000/ubuntu-ci:24.04
        - os: windows-latest
          runner: windows-latest
        - os: macos-15-intel
          runner: macos-15-intel
        - os: macos-latest
          runner: macos-latest
        - os: windows-11-arm
          runner: windows-11-arm
        exclude:
        - os: windows-11-arm
          python-version: "3.10"
        - os: windows-11-arm
          python-version: "3.9"
        # clang only on Linux
        - os: windows-latest
          compiler: clang
        - os: windows-11-arm
          compiler: clang
        - os: macos-latest
          compiler: clang
        - os: macos-15-intel
          compiler: clang
        # mac: only newest Python
        - os: macos-latest
          python-version: "3.9"
        - os: macos-latest
          python-version: "3.10"
        - os: macos-latest
          python-version: "3.11"
        - os: macos-latest
          python-version: "3.12"
        - os: macos-latest
          python-version: "3.13"
        - os: macos-15-intel
          python-version: "3.9"
        - os: macos-15-intel
          python-version: "3.10"
        - os: macos-15-intel
          python-version: "3.11"
        - os: macos-15-intel
          python-version: "3.12"
        - os: macos-15-intel
          python-version: "3.13"

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create isolated venv (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Ephemeral, per-job venv. Inside the self-hosted container it lives in
          # the throwaway container layer (/opt); on hosted runners in RUNNER_TEMP.
          # Never on the shared /__t toolcache, so a contaminated base interpreter
          # (e.g. a same-version build left behind by another job/repo) can't leak in.
          if [ -f /.dockerenv ]; then VENV=/opt/ci-venv; else VENV="$RUNNER_TEMP/ci-venv"; fi
          rm -rf "$VENV"
          python -m venv "$VENV"
          echo "$VENV/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$VENV" >> "$GITHUB_ENV"
      - name: Create isolated venv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $venv = Join-Path $env:RUNNER_TEMP 'ci-venv'
          if (Test-Path $venv) { Remove-Item -Recurse -Force $venv }
          python -m venv $venv
          Add-Content -Path $env:GITHUB_PATH -Value "$venv\Scripts"
          Add-Content -Path $env:GITHUB_ENV -Value "VIRTUAL_ENV=$venv"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: "Non-default compiler: set up Clang"
        if: matrix.compiler == 'clang'
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          echo "CMAKE_ARGS=-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++" >> $GITHUB_ENV
      - name: Install package
        env:
          VERBOSE: '1'
        run: |
          python -m pip install -v .[pytest]
      - name: Test with pytest
        run: |
          python -m pytest

  run_pytest_main:
    name: ${{ matrix.compiler == 'clang' && format('[clang] {0} / py{1}', matrix.os, matrix.python-version) || format('{0} / py{1}', matrix.os, matrix.python-version) }}
    if: github.repository_owner == 'michalsta' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        os: [linux-amd64, linux-arm64, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        compiler: [default, clang]
        include:
        - os: linux-amd64
          runner: [self-hosted, wloczykij-amd64]
          container: localhost:5000/ubuntu-ci:24.04
        - os: linux-arm64
          runner: [self-hosted, wloczykij-arm64]
          container: localhost:5000/ubuntu-ci:24.04
        - os: windows-latest
          runner: windows-latest
        - os: macos-latest
          runner: macos-latest
        exclude:
        # On main, only run 3.14 for Windows/macOS
        - os: windows-latest
          python-version: "3.9"
        - os: windows-latest
          python-version: "3.10"
        - os: windows-latest
          python-version: "3.11"
        - os: windows-latest
          python-version: "3.12"
        - os: windows-latest
          python-version: "3.13"
        - os: macos-latest
          python-version: "3.9"
        - os: macos-latest
          python-version: "3.10"
        - os: macos-latest
          python-version: "3.11"
        - os: macos-latest
          python-version: "3.12"
        - os: macos-latest
          python-version: "3.13"
        # No clang on Windows/macOS
        - os: windows-latest
          compiler: clang
        - os: macos-latest
          compiler: clang

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create isolated venv (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Ephemeral, per-job venv. Inside the self-hosted container it lives in
          # the throwaway container layer (/opt); on hosted runners in RUNNER_TEMP.
          # Never on the shared /__t toolcache, so a contaminated base interpreter
          # (e.g. a same-version build left behind by another job/repo) can't leak in.
          if [ -f /.dockerenv ]; then VENV=/opt/ci-venv; else VENV="$RUNNER_TEMP/ci-venv"; fi
          rm -rf "$VENV"
          python -m venv "$VENV"
          echo "$VENV/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$VENV" >> "$GITHUB_ENV"
      - name: Create isolated venv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $venv = Join-Path $env:RUNNER_TEMP 'ci-venv'
          if (Test-Path $venv) { Remove-Item -Recurse -Force $venv }
          python -m venv $venv
          Add-Content -Path $env:GITHUB_PATH -Value "$venv\Scripts"
          Add-Content -Path $env:GITHUB_ENV -Value "VIRTUAL_ENV=$venv"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: "Non-default compiler: set up Clang"
        if: matrix.compiler == 'clang'
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          echo "CMAKE_ARGS=-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++" >> $GITHUB_ENV
      - name: Install package
        env:
          VERBOSE: '1'
        run: |
          python -m pip install -v .[pytest]
      - name: Test with pytest
        run: |
          python -m pytest
