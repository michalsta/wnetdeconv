name: Build

on:
    push:
        branches:
            - ci_test
            - main
        tags:
            - 'v*'

jobs:
  run_pytest:
    name: ${{ matrix.compiler == 'clang' && format('[clang] {0}', matrix.os) || format('{0} / py{1}', matrix.os, matrix.python-version) }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-13 is an intel runner, macos-14 is apple silicon
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-15-intel, macos-latest, windows-11-arm]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        compiler: [default, clang]
        exclude:
        - os: windows-11-arm
          python-version: "3.10"
        - os: windows-11-arm
          python-version: "3.9"
        # clang only on Linux
        - os: windows-latest
          compiler: clang
        - os: windows-11-arm
          compiler: clang
        - os: macos-latest
          compiler: clang
        - os: macos-15-intel
          compiler: clang


    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      - name: "Non-default compiler: set up Clang"
        if: matrix.compiler == 'clang'
        run: |
          sudo apt-get install -y clang
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          echo "CMAKE_ARGS=-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++" >> $GITHUB_ENV
      - name: Install package
        env:
          VERBOSE: '1'
        run: |
          python -m pip install -v .[pytest]
      - name: Test with pytest
        run: |
          python -m pytest
